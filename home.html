<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Домик</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #81e9a8 0%, #19b23a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .house {
            position: relative;
            width: 480px;
            height: 450px;
            margin: 50px auto;
            filter: drop-shadow(10px 15px 10px rgba(0,0,0,0.2));
        }

        .base {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 270px;
            background-color: #f4c542;
            border: 3px solid #b97f2e;
            border-radius: 8px 8px 0 0;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
            z-index: 1;
        }

        .base::before {
            content: "";
            position: absolute;
            top: 25px;
            left: 20px;
            right: 20px;
            height: 3px;
            background: #b97f2e;
            opacity: 0.4;
            border-radius: 2px;
        }
        .base::after {
            content: "";
            position: absolute;
            top: 60px;
            left: 20px;
            right: 20px;
            height: 3px;
            background: #b97f2e;
            opacity: 0.4;
            border-radius: 2px;
        }

        .roof {
            position: absolute;
            bottom: 240px;
            left: -35px;
            width: calc(100% + 70px);
            height: 0;
            border-left: 275px solid transparent;
            border-right: 275px solid transparent;
            border-bottom: 210px solid #b5651e;
            z-index: 2;
            filter: drop-shadow(0 5px 3px rgba(0,0,0,0.2));
        }

        .chimney {
            position: absolute;
            bottom: 370px;
            right: 80px;
            width: 55px;
            height: 100px;
            background-color: #aa7c4a;
            border: 2px solid #6b3e1a;
            border-radius: 8px 8px 0 0;
            z-index: 3;
            box-shadow: inset -2px -2px 0 rgba(0,0,0,0.1), 2px 4px 6px rgba(0,0,0,0.2);
        }

        .chimney::before {
            content: "";
            position: absolute;
            top: -12px;
            left: -3px;
            width: 61px;
            height: 15px;
            background: #8b5a2b;
            border-radius: 8px 8px 0 0;
            border: 1px solid #6b3e1a;
        }

        .chimney::after {
            content: "";
            position: absolute;
            top: 20px;
            left: 12px;
            width: 32px;
            height: 3px;
            background: #6b3e1a;
            opacity: 0.4;
            border-radius: 2px;
            box-shadow: 0 18px 0 #6b3e1a, 0 36px 0 #6b3e1a, 0 54px 0 #6b3e1a;
        }

        .window-roof {
            position: absolute;
            top: 115px;
            left: 50%;
            transform: translateX(-50%);
            width: 90px;
            height: 90px;
            background-color: #c2e0f0;
            border: 5px solid #8b5a2b;
            border-radius: 50%;
            z-index: 4;
            box-shadow: inset 0 0 0 3px #fff3e0, 0 6px 12px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .window-roof .cross-horizontal {
            position: absolute;
            top: 50%;
            left: 12px;
            width: calc(100% - 24px);
            height: 4px;
            background: #6b3e1a;
            transform: translateY(-50%);
            border-radius: 2px;
        }

        .window-roof .cross-vertical {
            position: absolute;
            top: 12px;
            left: 50%;
            width: 4px;
            height: calc(100% - 24px);
            background: #6b3e1a;
            transform: translateX(-50%);
            border-radius: 2px;
        }

        .window-roof .sill {
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 8px;
            background: #b97f2e;
            border-radius: 4px;
            z-index: 5;
        }

        .window-roof::after {
            content: "";
            position: absolute;
            top: 12px;
            left: 12px;
            width: 25px;
            height: 25px;
            background: rgba(255,255,240,0.6);
            border-radius: 50%;
            pointer-events: none;
        }

        .window-roof:hover {
            transform: translateX(-50%) scale(1.02);
            background-color: #e8f4ff;
        }

        .window-left {
            position: absolute;
            bottom: 95px;
            left: 45px;
            width: 85px;
            height: 110px;
            background-color: #c2e0f0;
            border: 5px solid #8b5a2b;
            border-radius: 12px;
            z-index: 4;
            box-shadow: inset 0 0 0 3px #fff3e0, 0 4px 8px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .window-right {
            position: absolute;
            bottom: 95px;
            right: 45px;
            width: 85px;
            height: 110px;
            background-color: #c2e0f0;
            border: 5px solid #8b5a2b;
            border-radius: 12px;
            z-index: 4;
            box-shadow: inset 0 0 0 3px #fff3e0, 0 4px 8px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .window-left::before, .window-right::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 4px;
            background: #6b3e1a;
            transform: translateY(-50%);
        }

        .window-left::after, .window-right::after {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            width: 4px;
            height: 100%;
            background: #6b3e1a;
            transform: translateX(-50%);
        }

        .window-left .sill, .window-right .sill {
            position: absolute;
            bottom: -12px;
            left: -8px;
            width: calc(100% + 16px);
            height: 8px;
            background: #b97f2e;
            border-radius: 4px;
            z-index: 5;
        }

        .window-left::after {
            content: "";
            position: absolute;
            top: 12px;
            left: 12px;
            width: 20px;
            height: 20px;
            background: rgba(255,255,240,0.5);
            border-radius: 50%;
            pointer-events: none;
        }

        .window-right::after {
            content: "";
            position: absolute;
            top: 12px;
            left: 12px;
            width: 20px;
            height: 20px;
            background: rgba(255,255,240,0.5);
            border-radius: 50%;
            pointer-events: none;
        }

        .window-left:hover, .window-right:hover {
            transform: scale(1.02);
            background-color: #e8f4ff;
        }

        .door {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 85px;
            height: 140px;
            background-color: #8b5a2b;
            border: 3px solid #5a3a1a;
            border-radius: 12px 12px 0 0;
            z-index: 5;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1), 2px 4px 8px rgba(0,0,0,0.2);
        }

        .door::after {
            content: "";
            position: absolute;
            top: 50%;
            right: 12px;
            width: 10px;
            height: 10px;
            background: #ffcf40;
            border-radius: 50%;
            border: 1px solid #aa7c4a;
        }

        .ground {
            position: absolute;
            bottom: -15px;
            left: 0;
            width: 100%;
            height: 20px;
            background: #6b8c42;
            border-radius: 20px;
            z-index: 1;
        }

        .smoke {
            position: absolute;
            bottom: 445px;
            right: 65px;
            width: 75px;
            height: 55px;
            pointer-events: none;
            z-index: 6;
        }

        .smoke span {
            position: absolute;
            background: rgba(140, 130, 110, 0.6);
            border-radius: 50%;
            filter: blur(8px);
            animation: rise 3s infinite ease-out;
        }

        .smoke span:nth-child(1) {
            width: 24px;
            height: 24px;
            bottom: 0;
            left: 12px;
            animation-delay: 0s;
        }
        .smoke span:nth-child(2) {
            width: 38px;
            height: 38px;
            bottom: -8px;
            left: -5px;
            animation-delay: 0.8s;
        }
        .smoke span:nth-child(3) {
            width: 30px;
            height: 30px;
            bottom: -3px;
            left: 28px;
            animation-delay: 1.6s;
        }

        @keyframes rise {
            0% {
                opacity: 0.7;
                transform: translateY(0) scale(0.8);
            }
            100% {
                opacity: 0;
                transform: translateY(-70px) scale(1.5);
            }
        }

        @media (max-width: 650px) {
            .house {
                transform: scale(0.8);
            }
        }
    </style>
</head>
<body>
    <div class="house">
        <div class="base"></div>

        <div class="roof"></div>

        <div class="chimney"></div>

        <div class="window-roof">
            <div class="cross-horizontal"></div>
            <div class="cross-vertical"></div>
            <div class="sill"></div>
        </div>

        <div class="window-left">
            <div class="sill"></div>
        </div>
        <div class="window-right">
            <div class="sill"></div>
        </div>

        <div class="door"></div>

        <div class="ground"></div>

        <div class="smoke">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
</body>
</html>
